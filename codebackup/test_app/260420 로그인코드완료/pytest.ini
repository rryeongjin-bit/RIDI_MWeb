[pytest]

# 기본 실행 옵션
addopts =
    -s
    -v
    --tb=short

# 테스트 파일 탐색 경로
testpaths = tests

# 마커 정의
markers =
    smoke:      스모크 테스트 - 핵심 기능 빠른 검증
    regression: 회귀 테스트 - 전체 기능 검증
    login:      로그인 테스트
    home:       메인홈 테스트
    search:     검색 테스트
    library:    내서재 테스트
    notification: 알림 테스트
    aos:        Android 플랫폼
    ios:        iOS 플랫폼
    real:       실기기 환경
    emulator:   AOS 에뮬레이터 환경
    simulator:  iOS 시뮬레이터 환경

# 로그 설정
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S